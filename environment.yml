name: feedback

channels:
  - pytorch
  - nvidia
  - conda-forge

dependencies:
  # =========================
  # Python (kept as requested)
  # =========================
  - python=3.12.4
  - pip=25.3

  # =========================
  # PyTorch (CUDA-compatible on JZ)
  # =========================
  - pytorch==2.4.0
  - torchvision=0.19.0
  - torchaudio=2.4.0
  - pytorch-cuda=12.1

  # =========================
  # Core scientific stack (kept stable)
  # =========================
  - numpy==1.26.4
  - pandas=2.2.2
  - scipy=1.14.1
  - matplotlib=3.9.2
  - seaborn=0.13.2

  # =========================
  # Data / IO
  # =========================
  - pyarrow=14.0.2
  - arrow-cpp=14.0.2
  - libcurl=8.9.1
  - openssl=3.0.18
  - sqlite=3.45.3

  # =========================
  # System libs (kept, but NOT CUDA-pinned)
  # =========================
  - boost-cpp=1.82.0
  - glib=2.78.4
  - libxml2=2.13.1
  - libpng=1.6.39

  # =========================
  # AWS SDK (unchanged)
  # =========================
  - aws-sdk-cpp=1.10.55
  - aws-c-common=0.8.5
  - aws-c-event-stream=0.2.15
  - aws-c-s3=0.1.51

  # =========================
  # Pip dependencies
  # =========================
  - pip:
      - transformers==4.44.2
      - datasets==3.0.0
      - accelerate==0.33.0
      - evaluate==0.4.2
      - wandb==0.17.5
      - tqdm==4.66.5
      - regex==2024.7.24